<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>邮箱管理 - iDing's临时邮箱</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://unpkg.com/layui/dist/css/layui.css" />
  <script src="https://unpkg.com/layui/dist/layui.js"></script>
  <style>
    body { margin: 0; background: #f0f2f5; }
    .header { background: #001529; color: #fff; padding: 0 20px; height: 60px; line-height: 60px; }
    .header .logo { font-size: 20px; font-weight: bold; }
    .header .nav { float: right; }
    .header .nav a { color: #fff; margin-left: 20px; text-decoration: none; }
    .main-container { padding: 20px; max-width: 1400px; margin: 0 auto; }
    .toolbar { background: #fff; border-radius: 4px; padding: 15px; margin-bottom: 20px; }
    .toolbar-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 10px; }
    .toolbar-row:last-child { margin-bottom: 0; }
    .table-card { background: #fff; border-radius: 4px; padding: 20px; }
  </style>
  <script src="/js/auth-guard.js"></script>
  <script src="/js/toast-utils.js"></script>
</head>
<body>
  <div class="header">
    <span class="logo">📧 iDing's临时邮箱 - 邮箱总览</span>
    <div class="nav">
      <a href="/">🏠 首页</a>
      <a id="repo" href="https://github.com/idinging/freemail" target="_blank">GitHub</a>
      <a id="logout" href="javascript:void(0)">退出登录</a>
    </div>
  </div>

  <div class="main-container">
    <!-- 工具栏 -->
    <div class="toolbar">
      <div class="toolbar-row">
        <div class="layui-input-inline" style="width: 250px;">
          <input type="text" id="q" placeholder="搜索邮箱地址" class="layui-input" />
        </div>
        <button id="search" class="layui-btn layui-btn-normal">🔍 搜索</button>
        <select id="domain-filter" class="layui-input layui-inline" style="width: 150px;">
          <option value="">全部域名</option>
        </select>
        <select id="login-filter" class="layui-input layui-inline" style="width: 120px;">
          <option value="">登录状态</option>
          <option value="allowed">允许登录</option>
          <option value="denied">禁止登录</option>
        </select>
        <select id="favorite-filter" class="layui-input layui-inline" style="width: 120px;">
          <option value="">收藏状态</option>
          <option value="favorite">已收藏</option>
          <option value="not-favorite">未收藏</option>
        </select>
      </div>
      <div class="toolbar-row">
        <button id="batch-allow" class="layui-btn layui-btn-primary layui-btn-sm">✅ 批量放行</button>
        <button id="batch-deny" class="layui-btn layui-btn-primary layui-btn-sm">🚫 批量禁止</button>
        <button id="batch-favorite" class="layui-btn layui-btn-primary layui-btn-sm">⭐ 批量收藏</button>
        <button id="batch-unfavorite" class="layui-btn layui-btn-primary layui-btn-sm">☆ 批量取消</button>
        <button id="batch-forward" class="layui-btn layui-btn-primary layui-btn-sm">↪️ 批量转发</button>
        <button id="batch-clear-forward" class="layui-btn layui-btn-primary layui-btn-sm">🚫 清除转发</button>
      </div>
    </div>

    <!-- 表格卡片 -->
    <div class="table-card">
      <table id="mailbox-table" lay-filter="mailbox-table"></table>
      <div id="empty" class="empty-state layui-hide" style="text-align: center; padding: 60px 0; color: #999;">
        <div style="font-size: 48px; margin-bottom: 15px;">📭</div>
        <div>暂无数据</div>
      </div>
    </div>
  </div>

  <div id="footer-slot"></div>

  <!-- 重置密码弹窗 -->
  <div id="reset-modal" style="display: none; padding: 20px;">
    <p style="margin: 0 0 12px 0; color: #334155;">将把该邮箱的密码重置为"默认"（即邮箱地址本身）。</p>
    <div style="padding: 12px; border: 1px solid var(--border-light); border-radius: 8px; background: #fafafa; margin-bottom: 16px;">
      <div style="color: #475569; font-size: 12px;">邮箱地址</div>
      <div id="reset-email" style="font-weight: 700; color: #111827; word-break: break-all;"></div>
    </div>
    <div style="text-align: right;">
      <button id="reset-cancel" class="layui-btn layui-btn-primary">取消</button>
      <button id="reset-confirm" class="layui-btn layui-btn-danger">确定重置</button>
    </div>
  </div>

  <!-- 登录权限确认框 -->
  <div id="login-confirm-modal" style="display: none; padding: 20px;">
    <p id="login-confirm-message" style="margin: 0 0 12px 0; color: #334155;"></p>
    <div style="padding: 12px; border: 1px solid #eee; border-radius: 8px; background: #fafafa; margin-bottom: 16px;">
      <div style="color: #475569; font-size: 12px;">邮箱地址</div>
      <div id="login-confirm-email" style="font-weight: 700; color: #111827; word-break: break-all;"></div>
    </div>
    <div style="text-align: right;">
      <button id="login-confirm-cancel" class="layui-btn layui-btn-primary">取消</button>
      <button id="login-confirm-ok" class="layui-btn layui-btn-normal">确定</button>
    </div>
  </div>

  <!-- 修改密码弹窗 -->
  <div id="change-password-modal" style="display: none; padding: 20px;">
    <p style="margin: 0 0 12px 0; color: #334155;">为该邮箱设置新的自定义密码。</p>
    <div style="padding: 16px; border: 1px solid #e2e8f0; border-radius: 12px; background: #f8fafc; margin-bottom: 16px;">
      <div style="color: #475569; font-size: 12px;">邮箱地址</div>
      <div id="change-password-email" style="font-weight: 700; color: #111827; word-break: break-all;"></div>
    </div>
    <form class="layui-form" lay-filter="change-password-form">
      <div class="layui-form-item">
        <label class="layui-form-label">新密码</label>
        <div class="layui-input-block">
          <input type="password" id="new-password" name="newPassword" lay-verify="required|minlength:6" class="layui-input" placeholder="请输入新密码（至少6位）" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">确认密码</label>
        <div class="layui-input-block">
          <input type="password" id="confirm-password" name="confirmPassword" lay-verify="required|minlength:6" class="layui-input" placeholder="请再次输入新密码" />
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="change-password-submit" class="layui-btn layui-btn-normal">修改密码</button>
          <button type="button" id="change-password-cancel" class="layui-btn layui-btn-primary">取消</button>
        </div>
      </div>
    </form>
  </div>

  <!-- 批量操作弹窗 -->
  <div id="batch-login-modal" style="display: none; padding: 20px;">
    <p id="batch-modal-message" style="margin: 0 0 12px 0; color: #334155;"></p>
    <div class="layui-form-item">
      <label class="layui-form-label">邮箱列表</label>
      <div class="layui-input-block">
        <textarea id="batch-emails-input" class="layui-textarea" placeholder="请输入邮箱地址，一行一个" rows="10" style="font-family: monospace;"></textarea>
      </div>
    </div>
    <div id="batch-forward-input-wrapper" class="layui-form-item layui-hide">
      <label class="layui-form-label">转发目标</label>
      <div class="layui-input-block">
        <input type="email" id="batch-forward-target" class="layui-input" placeholder="转发目标邮箱" />
      </div>
    </div>
    <div style="text-align: right;">
      <button id="batch-modal-cancel" class="layui-btn layui-btn-primary">取消</button>
      <button id="batch-modal-confirm" class="layui-btn layui-btn-normal" disabled>确定操作</button>
    </div>
  </div>

  <!-- 分配用户弹窗 -->
  <div id="assign-user-subpage" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;">
    <div style="background: #fff; border-radius: 8px; width: 600px; max-height: 80vh; margin: 10vh auto; overflow: auto;">
      <div style="padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
        <h3 style="margin: 0;">👤 分配邮箱给用户</h3>
        <button id="assign-subpage-close" class="layui-btn layui-btn-primary layui-btn-sm">✕ 关闭</button>
      </div>
      <div style="padding: 20px;">
        <div style="margin-bottom: 15px;">
          <label style="font-weight: 500;">邮箱地址</label>
          <div id="assign-subpage-email" style="margin-top: 5px; color: #1890ff;"></div>
        </div>
        <div class="layui-form-item">
          <input type="text" id="user-search-input" placeholder="搜索用户名或显示名称..." class="layui-input" />
        </div>
        <div id="users-list" style="max-height: 300px; overflow-y: auto;"></div>
        <div style="margin-top: 15px; text-align: right;">
          <span id="selected-count">已选择 0 个用户</span>
          <button id="assign-subpage-confirm" class="layui-btn layui-btn-normal" style="margin-left: 10px;">确定分配</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/toast-utils.js"></script>
  <script type="module" src="/js/mailboxes.js"></script>
  <script>
    (async function(){
      try{
        const res = await fetch('/templates/footer.html', { cache: 'no-cache' });
        const html = await res.text();
        const slot = document.getElementById('footer-slot');
        if (slot){ slot.outerHTML = html; }
      }catch(_){}
    })();
  </script>
</body>
</html>
