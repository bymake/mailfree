<!DOCTYPE html>
<html lang="zh-CN" class="precheck-hide">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的邮箱 - 邮箱</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://unpkg.com/layui/dist/css/layui.css" />
  <script src="https://unpkg.com/layui/dist/layui.js"></script>
  <style>
    body { margin: 0; background: #f0f2f5; }
    .header { background: #001529; color: #fff; padding: 0 20px; height: 60px; line-height: 60px; }
    .header .logo { font-size: 20px; font-weight: bold; }
    .header .nav { float: right; }
    .header .nav a { color: #fff; margin-left: 20px; text-decoration: none; }
    .main-container { padding: 20px; max-width: 1200px; margin: 0 auto; }
    .mailbox-panel { background: #fff; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
    .mailbox-panel h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .mailbox-display { font-size: 24px; color: #1890ff; margin: 15px 0; word-break: break-all; }
    .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .info-row { display: flex; gap: 15px; margin-bottom: 10px; }
    .inbox-card { background: #fff; border-radius: 4px; padding: 20px; }
    .email-table { width: 100%; }
    .email-table th { background: #fafafa; }
  </style>
  <script src="/js/auth-guard.js" defer></script>
  <script>
    (function(){
      fetch('/api/session', { headers: { 'Cache-Control': 'no-cache' } })
        .then(r => r.ok ? r.json() : Promise.reject('unauth'))
        .then(s => {
          if (s && s.role === 'mailbox'){
            try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ }
            return;
          }
          location.replace('/');
        })
        .catch(() => {
          if (window.AuthGuard) { window.AuthGuard.goLoading('/html/mailbox.html', '正在校验权限…'); }
          else { location.replace('/templates/loading.html?redirect=%2Fhtml%2Fmailbox.html&status=' + encodeURIComponent('正在校验权限…')); }
        });
    })();
  </script>
</head>
<body>
  <div class="header">
    <span class="logo">📧 邮箱</span>
    <div class="nav">
      <a id="repo" href="https://github.com/idinging/freemail" target="_blank">GitHub</a>
      <a id="logout" href="javascript:void(0)">退出登录</a>
    </div>
  </div>

  <div class="main-container">
    <!-- 邮箱信息卡片 -->
    <div class="mailbox-panel">
      <h2>📬 我的邮箱</h2>
      <div class="mailbox-display" id="current-mailbox">加载中...</div>
      <div class="action-buttons">
        <button id="copy-mailbox" class="layui-btn layui-btn-primary">📋 复制</button>
        <button id="change-password" class="layui-btn layui-btn-normal">🔒 修改密码</button>
      </div>
      <div class="info-row" style="margin-top: 20px;">
        <span class="layui-badge">未读 <span id="unread-count">0</span></span>
        <span class="layui-badge layui-bg-gray">全部 <span id="total-count">0</span></span>
        <div style="margin-left: auto;">
          <input type="checkbox" id="auto-refresh" lay-skin="switch" lay-text="自动刷新|关闭" title="自动刷新" />
          <select id="refresh-interval" class="layui-input layui-inline" style="width: 100px;">
            <option value="10">10秒</option>
            <option value="30" selected>30秒</option>
            <option value="60">60秒</option>
          </select>
        </div>
      </div>
      <div style="margin-top: 10px;">
        <div class="layui-input-inline" style="width: 300px;">
          <input type="text" id="search-box" placeholder="搜索发件人/主题" class="layui-input" />
        </div>
        <button id="clear-filter" class="layui-btn layui-btn-primary layui-btn-sm">清空</button>
        <button id="refresh-emails" class="layui-btn layui-btn-sm">🔄 刷新</button>
      </div>
    </div>

    <!-- 收件箱 -->
    <div class="inbox-card">
      <h2 style="margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <span>📨</span> 收件箱 <span class="layui-badge layui-bg-gray" style="margin-left: 10px;">仅保留24小时</span>
      </h2>
      <div id="list-loading" style="text-align: center; padding: 40px; color: #999;">
        <i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop" style="font-size: 30px;"></i>
        <div style="margin-top: 10px;">加载中...</div>
      </div>
      <table id="email-table" class="layui-hide" lay-filter="email-table"></table>
      <div id="empty-state" class="empty-state" style="display: none; text-align: center; padding: 60px 0; color: #999;">
        <div style="font-size: 48px; margin-bottom: 15px;">📭</div>
        <div>暂无邮件</div>
      </div>
      <div id="list-pager" style="text-align: center; padding: 15px; display: none;">
        <button id="prev-page" class="layui-btn layui-btn-sm layui-btn-primary">上一页</button>
        <span id="page-info" style="padding: 0 15px;"></span>
        <button id="next-page" class="layui-btn layui-btn-sm layui-btn-primary">下一页</button>
      </div>
    </div>
  </div>

  <div id="footer-slot"></div>

  <!-- 邮件详情模板 -->
  <script type="text/html" id="email-detail-tpl">
    <div style="padding: 20px;">
      <div style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px;">
        <h3 id="modal-subject" style="margin: 0 0 10px 0;"></h3>
        <div id="modal-from" style="color: #666; font-size: 14px;"></div>
        <div id="modal-date" style="color: #999; font-size: 12px; margin-top: 5px;"></div>
      </div>
      <div id="modal-content" style="line-height: 1.8;"></div>
    </div>
  </script>

  <!-- 确认删除弹窗 -->
  <div id="confirm-modal" style="display: none; padding: 20px; text-align: center;">
    <div id="confirm-message" style="margin-bottom: 20px; font-size: 16px;"></div>
    <div>
      <button id="confirm-cancel" class="layui-btn layui-btn-primary">取消</button>
      <button id="confirm-ok" class="layui-btn layui-btn-danger">确定</button>
    </div>
  </div>

  <!-- 修改密码弹窗 -->
  <div id="password-modal" style="display: none; padding: 20px;">
    <div style="background: #fff3cd; padding: 10px; border-radius: 4px; margin-bottom: 15px; color: #856404;">
      ⚠️ 修改密码后需要重新登录
    </div>
    <form class="layui-form" lay-filter="password-form">
      <div class="layui-form-item">
        <label class="layui-form-label">当前密码</label>
        <div class="layui-input-block">
          <input type="password" id="current-password" name="current" lay-verify="required" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">新密码</label>
        <div class="layui-input-block">
          <input type="password" id="new-password" name="new" lay-verify="required|minlength:6" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">确认密码</label>
        <div class="layui-input-block">
          <input type="password" id="confirm-password" name="confirm" lay-verify="required|minlength:6" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="password-submit" class="layui-btn layui-btn-normal">修改密码</button>
          <button type="button" id="password-cancel" class="layui-btn layui-btn-primary">取消</button>
        </div>
      </div>
    </form>
  </div>

  <script src="/js/toast-utils.js"></script>
  <script type="module" src="/js/mailbox.js"></script>
  <script>
    (async function(){
      try{
        const res = await fetch('/templates/footer.html', { cache: 'no-cache' });
        const html = await res.text();
        const slot = document.getElementById('footer-slot');
        if (slot){ slot.outerHTML = html; }
      }catch(_){}
    })();
  </script>
</body>
</html>
