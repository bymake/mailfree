<!DOCTYPE html>
<html lang="zh-CN" class="precheck-hide">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>用户管理 - iDing's临时邮箱</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <noscript>
    <meta http-equiv="refresh" content="0; url=/templates/loading.html?redirect=%2Fhtml%2Fadmin.html" />
  </noscript>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="https://unpkg.com/layui/dist/css/layui.css" />
  <script src="https://unpkg.com/layui/dist/layui.js"></script>
  <style>
    body { margin: 0; background: #f0f2f5; }
    .header { background: #001529; color: #fff; padding: 0 20px; height: 60px; line-height: 60px; }
    .header .logo { font-size: 20px; font-weight: bold; }
    .header .nav { float: right; }
    .header .nav button { background: none; border: none; color: #fff; margin-left: 20px; cursor: pointer; }
    .main-container { padding: 20px; max-width: 1600px; margin: 0 auto; }
    .card { background: #fff; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
    .card h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .user-card { flex: 1; min-width: 600px; }
    .mailbox-card { flex: 0 0 400px; }
    .empty-state { text-align: center; padding: 60px 0; color: #999; }
    .split-layout { display: flex; gap: 20px; }
  </style>
  <script src="/js/auth-guard.js" defer></script>
  <script>
    (function(){
      fetch('/api/session', { headers: { 'Cache-Control': 'no-cache' } })
        .then(r => r.ok ? r.json() : Promise.reject('unauth'))
        .then(s => {
          if (s && (s.role === 'admin' || s.role === 'guest' || s.strictAdmin)){
            try{ document.documentElement.classList.remove('precheck-hide'); }catch(_){ }
            return;
          }
          location.replace('/');
        })
        .catch(() => {
          if (window.AuthGuard) { window.AuthGuard.goLoading('/html/admin.html', '正在校验权限…'); }
          else { location.replace('/templates/loading.html?redirect=%2Fhtml%2Fadmin.html&status=' + encodeURIComponent('正在校验权限…')); }
        });
    })();
  </script>
</head>
<body>
  <div class="header">
    <span class="logo">🚀 iDing's临时邮箱 - 用户管理</span>
    <div class="nav">
      <button id="back">📧 返回邮箱</button>
      <button id="logout">👋 退出登录</button>
    </div>
  </div>

  <div id="demo-banner" class="layui-alert layui-alert-warning" style="display: none; margin: 0; border-radius: 0; text-align: center;">
    当前为演示管理页：所有改动仅在浏览器会话中模拟
  </div>

  <div class="main-container">
    <div class="split-layout">
      <!-- 左侧：用户管理 -->
      <div class="user-card">
        <div class="card">
          <h2>👤 用户管理</h2>
          <div class="layui-form" style="margin-bottom: 15px;">
            <button id="u-open" class="layui-btn layui-btn-normal">➕ 创建用户</button>
            <button id="unassign-open" class="layui-btn">📭 取消分配</button>
            <button id="a-open" class="layui-btn layui-btn-normal">📬 分配邮箱</button>
          </div>
        </div>

        <div class="card">
          <div class="card-header">
            <h2 style="margin: 0; border: none; padding: 0;">📋 用户列表 <span id="users-count" class="layui-badge">0 用户</span></h2>
            <button id="users-refresh" class="layui-btn layui-btn-primary layui-btn-sm">🔄 刷新</button>
          </div>
          <div id="users-loading" style="text-align: center; padding: 20px; color: #999;">
            <i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...
          </div>
          <table id="users-table" lay-filter="users-table"></table>
          <div id="users-pagination" style="text-align: center; padding: 15px; display: none;">
            <button id="prev-page" class="layui-btn layui-btn-sm layui-btn-primary">上一页</button>
            <span id="page-info" style="padding: 0 15px;"></span>
            <button id="next-page" class="layui-btn layui-btn-sm layui-btn-primary">下一页</button>
          </div>
        </div>
      </div>

      <!-- 右侧：用户邮箱列表 -->
      <div class="mailbox-card">
        <div class="card">
          <div class="card-header">
            <h2 style="margin: 0; border: none; padding: 0;">📦 用户的邮箱列表 <span id="mailboxes-count" class="layui-badge">0 邮箱</span></h2>
            <button id="mailboxes-refresh" class="layui-btn layui-btn-primary layui-btn-sm" style="display: none;">🔄 刷新</button>
          </div>
          <div id="user-mailboxes-loading" style="text-align: center; padding: 20px; color: #999; display: none;">
            <i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...
          </div>
          <div id="user-mailboxes">
            <div class="empty-state">
              <div style="font-size: 48px; margin-bottom: 15px;">📭</div>
              <div>点击左侧用户查看其邮箱</div>
            </div>
          </div>
          <div id="mailboxes-pagination" style="text-align: center; padding: 15px; display: none;">
            <button id="mailboxes-prev-page" class="layui-btn layui-btn-sm layui-btn-primary">上一页</button>
            <span id="mailboxes-page-info" style="padding: 0 15px;"></span>
            <button id="mailboxes-next-page" class="layui-btn layui-btn-sm layui-btn-primary">下一页</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <div id="footer-slot"></div>

  <!-- 编辑用户弹窗 -->
  <div id="edit-modal" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="edit-form">
      <div class="layui-form-item">
        <label class="layui-form-label">新密码</label>
        <div class="layui-input-block">
          <input type="password" id="edit-pass" name="pass" placeholder="留空则不修改" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">新用户名</label>
        <div class="layui-input-block">
          <input type="text" id="edit-new-name" name="newName" placeholder="留空则不修改" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">邮箱上限</label>
        <div class="layui-input-block">
          <input type="number" id="edit-limit" name="limit" min="0" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">权限</label>
        <div class="layui-input-block">
          <input type="checkbox" id="edit-role-check" title="高级用户" lay-skin="primary" />
          <input type="checkbox" id="edit-send-check" title="允许发件" lay-skin="primary" />
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="edit-save" class="layui-btn layui-btn-normal">保存</button>
          <button type="button" id="edit-cancel" class="layui-btn layui-btn-primary">取消</button>
          <button type="button" id="edit-delete" class="layui-btn layui-btn-danger" style="float: right;">删除用户</button>
        </div>
      </div>
    </form>
  </div>

  <!-- 确认对话框 -->
  <div id="admin-confirm-modal" style="display: none; padding: 20px; text-align: center;">
    <div id="admin-confirm-message" style="margin-bottom: 20px; font-size: 16px;"></div>
    <div>
      <button id="admin-confirm-cancel" class="layui-btn layui-btn-primary">取消</button>
      <button id="admin-confirm-ok" class="layui-btn layui-btn-danger">确定</button>
    </div>
  </div>

  <!-- 创建用户弹窗 -->
  <div id="u-modal" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="u-form">
      <div class="layui-form-item">
        <label class="layui-form-label">用户名</label>
        <div class="layui-input-block">
          <input type="text" id="u-name" name="name" lay-verify="required" placeholder="username" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">密码</label>
        <div class="layui-input-block">
          <input type="password" id="u-pass" name="pass" lay-verify="required" placeholder="password" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">角色</label>
        <div class="layui-input-block">
          <select id="u-role" name="role" class="layui-input">
            <option value="user">普通用户</option>
            <option value="admin">高级用户</option>
          </select>
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="u-create" class="layui-btn layui-btn-normal">创建</button>
          <button type="button" id="u-cancel" class="layui-btn layui-btn-primary">取消</button>
        </div>
      </div>
    </form>
  </div>

  <!-- 分配邮箱弹窗 -->
  <div id="a-modal" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="a-form">
      <div class="layui-form-item">
        <label class="layui-form-label">用户名</label>
        <div class="layui-input-block">
          <input type="text" id="a-name" name="name" lay-verify="required" placeholder="username" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">邮箱地址</label>
        <div class="layui-input-block">
          <textarea id="a-mail" name="mail" lay-verify="required" placeholder="foo@example.com&#10;bar@example.com&#10;baz@example.com" rows="4" class="layui-textarea" style="font-family: monospace;"></textarea>
          <div class="layui-form-mid" style="color: #999;">每行一个邮箱地址，支持批量分配</div>
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="a-assign" class="layui-btn layui-btn-normal">分配</button>
          <button type="button" id="a-cancel" class="layui-btn layui-btn-primary">取消</button>
        </div>
      </div>
    </form>
  </div>

  <!-- 取消分配弹窗 -->
  <div id="unassign-modal" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="unassign-form">
      <div class="layui-form-item">
        <label class="layui-form-label">用户名</label>
        <div class="layui-input-block">
          <input type="text" id="unassign-name" name="name" lay-verify="required" placeholder="username" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">邮箱地址</label>
        <div class="layui-input-block">
          <textarea id="unassign-mail" name="mail" lay-verify="required" placeholder="foo@example.com&#10;bar@example.com&#10;baz@example.com" rows="4" class="layui-textarea" style="font-family: monospace;"></textarea>
          <div class="layui-form-mid" style="color: #999;">每行一个邮箱地址，支持批量取消分配</div>
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="unassign-submit" class="layui-btn layui-btn-danger">取消分配</button>
          <button type="button" id="unassign-cancel" class="layui-btn layui-btn-primary">取消</button>
        </div>
      </div>
    </form>
  </div>

  <script src="/js/toast-utils.js"></script>
  <script type="module" src="/js/admin.js"></script>
  <script>
    (async function(){
      try{
        const res = await fetch('/templates/footer.html', { cache: 'no-cache' });
        const html = await res.text();
        const slot = document.getElementById('footer-slot');
        if (slot){ slot.outerHTML = html; }
      }catch(_){}
    })();
  </script>
</body>
</html>
