<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>临时邮箱 - iDing's临时邮箱</title>
  <link rel="stylesheet" href="https://unpkg.com/layui/dist/css/layui.css" />
  <script src="https://unpkg.com/layui/dist/layui.js"></script>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    body { margin: 0; background: #f0f2f5; }
    .header { background: #001529; color: #fff; padding: 0 20px; height: 60px; line-height: 60px; }
    .header .logo { font-size: 20px; font-weight: bold; }
    .header .nav { float: right; }
    .header .nav a { color: #fff; margin-left: 20px; text-decoration: none; }
    .main-container { padding: 20px; }
    .mailbox-panel { background: #fff; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
    .mailbox-panel h2 { margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
    .mailbox-display { font-size: 24px; color: #1890ff; margin: 15px 0; word-break: break-all; }
    .mailbox-info { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .config-section { background: #fff; border-radius: 4px; padding: 20px; margin-bottom: 20px; }
    .config-section h3 { margin: 0 0 15px 0; font-size: 16px; }
    .inbox-card { background: #fff; border-radius: 4px; padding: 20px; }
    .email-list .email-item { padding: 15px; border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background 0.2s; }
    .email-list .email-item:hover { background: #f5f5f5; }
    .email-item .subject { font-weight: 500; color: #333; margin-bottom: 5px; }
    .email-item .meta { font-size: 12px; color: #999; }
    .empty-state { text-align: center; padding: 60px 0; color: #999; }
    .empty-state .icon { font-size: 48px; margin-bottom: 15px; }
  </style>
  <script src="/js/auth-guard.js"></script>
  <script src="/js/mock.js"></script>
  <script src="/js/toast-utils.js"></script>
</head>
<body>
  <div class="header">
    <span class="logo">📧 iDing's临时邮箱</span>
    <div class="nav">
      <a id="repo" href="https://github.com/idinging/freemail" target="_blank">GitHub</a>
      <a id="logout" href="javascript:void(0)">退出登录</a>
    </div>
  </div>

  <div class="main-container">
    <!-- 邮箱生成面板 -->
    <div class="mailbox-panel">
      <h2>📬 生成临时邮箱</h2>
      <div class="layui-form" lay-filter="mailbox-form">
        <div class="layui-form-item">
          <label class="layui-form-label" style="width: 100px;">邮箱后缀</label>
          <div class="layui-input-inline" style="width: 200px;">
            <select name="domain" id="domain-select" class="layui-input">
              <option value="">选择域名</option>
            </select>
          </div>
          <div class="layui-input-inline" style="width: 150px;">
            <input type="number" name="length" id="len-range" min="8" max="30" value="8" class="layui-input" placeholder="长度" />
          </div>
          <div class="layui-input-inline">
            <button type="button" id="gen" class="layui-btn layui-btn-normal">随机生成</button>
            <button type="button" id="gen-name" class="layui-btn">随机人名</button>
          </div>
        </div>
      </div>
      <div class="mailbox-display" id="email-text">
        <span style="color: #999; font-size: 16px;">点击生成按钮创建邮箱地址</span>
      </div>
      <div class="action-buttons" id="email-actions" style="display: none;">
        <button id="copy" class="layui-btn layui-btn-primary">📋 复制邮箱</button>
        <button id="compose" class="layui-btn layui-btn-normal">✉️ 发邮件</button>
        <button id="clear" class="layui-btn layui-btn-danger">🗑️ 清空邮件</button>
        <button id="refresh" class="layui-btn">🔄 刷新邮件</button>
        <button id="forward-setting" class="layui-btn layui-btn-primary">↪️ 转发设置</button>
        <button id="toggle-favorite" class="layui-btn layui-btn-primary">☆ 收藏邮箱</button>
      </div>
    </div>

    <!-- 收件箱 -->
    <div class="inbox-card" id="list-card" style="display: none;">
      <h2 style="margin: 0 0 15px 0; font-size: 18px; border-bottom: 1px solid #eee; padding-bottom: 10px;">
        <span id="box-icon">📨</span> <span id="box-title">收件箱</span>
        <span class="layui-badge layui-bg-gray" style="margin-left: 10px;">仅保留24小时</span>
      </h2>
      <div class="layui-form" style="margin-bottom: 15px;">
        <div class="layui-form-item" style="margin-bottom: 0;">
          <div class="layui-input-inline" style="width: 200px;">
            <select id="tab-inbox" class="layui-input">
              <option value="inbox">收件箱</option>
              <option value="sent">发件箱</option>
            </select>
          </div>
          <div class="layui-input-inline" style="width: 300px;">
            <input type="text" id="search-box" placeholder="搜索发件人/主题" class="layui-input" />
          </div>
          <button type="button" id="clear-filter" class="layui-btn layui-btn-primary layui-btn-sm">清空</button>
          <button type="button" id="refresh-emails" class="layui-btn layui-btn-sm">🔄 刷新</button>
        </div>
      </div>
      <div id="list-loading" style="text-align: center; padding: 20px; color: #999;">
        <i class="layui-icon layui-icon-loading layui-anim layui-anim-rotate layui-anim-loop"></i> 加载中...
      </div>
      <div id="email-list" class="email-list" style="display: none;"></div>
      <div id="empty-state" class="empty-state" style="display: none;">
        <div class="icon">📭</div>
        <div>暂无邮件</div>
      </div>
      <div id="list-pager" style="text-align: center; padding: 15px; display: none;">
        <button id="prev-page" class="layui-btn layui-btn-sm layui-btn-primary">上一页</button>
        <span id="page-info" style="padding: 0 15px;"></span>
        <button id="next-page" class="layui-btn layui-btn-sm layui-btn-primary">下一页</button>
      </div>
    </div>
  </div>

  <!-- 邮件详情弹窗 -->
  <div id="email-modal" style="display: none; padding: 20px;">
    <div id="modal-content"></div>
  </div>

  <!-- 确认删除弹窗 -->
  <div id="confirm-modal" style="display: none; padding: 20px;">
    <div id="confirm-message" style="margin-bottom: 20px;"></div>
    <div style="text-align: right;">
      <button id="confirm-cancel" class="layui-btn layui-btn-primary">取消</button>
      <button id="confirm-ok" class="layui-btn layui-btn-danger">确定</button>
    </div>
  </div>

  <!-- 撰写邮件弹窗 -->
  <div id="compose-modal" style="display: none; padding: 20px;">
    <form class="layui-form" lay-filter="compose-form">
      <div class="layui-form-item">
        <label class="layui-form-label">收件人</label>
        <div class="layui-input-block">
          <input type="text" id="compose-to" name="to" lay-verify="required" placeholder="foo@example.com, bar@example.com" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">发件名称</label>
        <div class="layui-input-block">
          <input type="text" id="compose-from-name" name="fromName" placeholder="例如：iDing 支持团队" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">主题</label>
        <div class="layui-input-block">
          <input type="text" id="compose-subject" name="subject" lay-verify="required" placeholder="主题" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">内容</label>
        <div class="layui-input-block">
          <textarea id="compose-body" name="body" rows="10" placeholder="请输入邮件内容" class="layui-textarea"></textarea>
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="compose-send" class="layui-btn layui-btn-normal">发送</button>
          <button type="button" id="compose-cancel" class="layui-btn layui-btn-primary">取消</button>
        </div>
      </div>
    </form>
  </div>

  <!-- 修改密码弹窗 -->
  <div id="password-modal" style="display: none; padding: 20px;">
    <div style="background: #fff3cd; padding: 10px; border-radius: 4px; margin-bottom: 15px; color: #856404;">
      ⚠️ 修改密码后需要重新登录
    </div>
    <form class="layui-form" lay-filter="password-form">
      <div class="layui-form-item">
        <label class="layui-form-label">当前密码</label>
        <div class="layui-input-block">
          <input type="password" id="current-password" name="current" lay-verify="required" placeholder="请输入当前密码" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">新密码</label>
        <div class="layui-input-block">
          <input type="password" id="new-password" name="new" lay-verify="required|minlength:6" placeholder="请输入新密码（至少6位）" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <label class="layui-form-label">确认密码</label>
        <div class="layui-input-block">
          <input type="password" id="confirm-password" name="confirm" lay-verify="required|minlength:6" placeholder="请再次输入新密码" class="layui-input" />
        </div>
      </div>
      <div class="layui-form-item">
        <div class="layui-input-block">
          <button lay-submit lay-filter="password-submit" class="layui-btn layui-btn-normal">修改密码</button>
          <button type="button" id="password-cancel" class="layui-btn layui-btn-primary">取消</button>
        </div>
      </div>
    </form>
  </div>

  <div id="footer-slot"></div>
  <script type="module" src="/js/app.js"></script>
  <script>
    // 动态加载 footer
    (async function(){
      try{
        const res = await fetch('/templates/footer.html', { cache: 'no-cache' });
        const html = await res.text();
        const slot = document.getElementById('footer-slot');
        if (slot){ slot.outerHTML = html; }
      }catch(_){}
    })();
  </script>
</body>
</html>
