<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>登录 - 临时邮箱</title>
    <link rel="stylesheet" href="https://unpkg.com/layui/dist/css/layui.css" />
    <script src="https://unpkg.com/layui/dist/layui.js"></script>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="shortcut icon" href="favicon.svg" type="image/svg+xml" />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0;
      }
      .login-card {
        background: #fff;
        border-radius: 8px;
        padding: 40px;
        width: 400px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      }
      .login-card h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
        font-size: 24px;
      }
      .login-card .layui-form-item {
        margin-bottom: 20px;
      }
      .login-card .tip {
        text-align: center;
        color: #999;
        font-size: 12px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="login-card">
      <h1>📧 临时邮箱</h1>
      <form class="layui-form" lay-filter="login-form">
        <div class="layui-form-item">
          <label class="layui-form-label">用户名</label>
          <div class="layui-input-block">
            <input type="text" name="username" id="username" lay-verify="required" placeholder="请输入用户名/邮箱" autocomplete="off" class="layui-input" />
          </div>
        </div>
        <div class="layui-form-item">
          <label class="layui-form-label">密码</label>
          <div class="layui-input-block">
            <input type="password" name="pwd" id="pwd" lay-verify="required" placeholder="请输入密码" autocomplete="off" class="layui-input" />
          </div>
        </div>
        <div class="tip">账号：guest，密码：admin，将进入观看模式</div>
        <div class="layui-form-item">
          <button lay-submit lay-filter="login" class="layui-btn layui-btn-normal" style="width: 100%">登录</button>
        </div>
      </form>
    </div>

    <div id="toast" class="layui-layim-skin"></div>
    <script src="/js/toast-utils.js"></script>
    <script src="/js/mock.js"></script>
    <script src="/js/auth-guard.js"></script>
    <script>
      // 检查登录状态
      (function(){
        try{
          var hasToken = document.cookie.split(';').some(function(c){
            return c.trim().indexOf('iding-session=') === 0;
          });
          if (hasToken){
            fetch('/api/session', {
              method: 'GET',
              headers: { 'Cache-Control': 'no-cache' },
              credentials: 'include'
            }).then(function(r){
              if (r && r.ok) location.replace('/');
            }).catch(function(){});
          }
        }catch(_){}
      })();

      layui.use('form', function(){
        var form = layui.form;
        var layer = layui.layer;

        form.on('submit(login)', function(data){
          var username = data.field.username;
          var pwd = data.field.pwd;

          fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({ username: username, password: pwd })
          }).then(function(r){
            return r.json().then(function(data){
              return { ok: r.ok, data: data };
            });
          }).then(function(result){
            if (result.ok && result.data.success){
              window.location.href = result.data.redirect || '/';
            } else {
              layer.msg(result.data.error || '登录失败', { icon: 5 });
            }
          }).catch(function(err){
            layer.msg('登录请求失败', { icon: 5 });
          });

          return false;
        });
      });
    </script>
  </body>
</html>
